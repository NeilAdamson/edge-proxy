services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hms_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8.10
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@strategyzone.co.za}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me-strong-password}
      PGADMIN_LISTEN_PORT: 80
    ports:
      # Fixed host ports (no ${VAR} interpolation) so prod/dev never hit "invalid hostPort"
      # from corrupted shell env or stray CRLF in .env. Override with a local compose override file if needed.
      - "8081:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/hms_dev?schema=public}
      - COOKIE_SECRET=${COOKIE_SECRET:-hms-local-cookie-secret}
      - SIGN_OFF_AUTO_COMPLETE_DAYS=${SIGN_OFF_AUTO_COMPLETE_DAYS:-7}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - db
    command: npm run dev --workspace=apps/api

  resident:
    build:
      context: .
      dockerfile: ./apps/resident/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_PERSONA=resident
    command: npm run dev --workspace=apps/resident

  provider:
    build:
      context: .
      dockerfile: ./apps/provider/Dockerfile.dev
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_PERSONA=provider
    command: npm run dev --workspace=apps/provider

  operator:
    build:
      context: .
      dockerfile: ./apps/operator/Dockerfile.dev
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_PERSONA=operator
    command: npm run dev --workspace=apps/operator

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - resident
      - provider
      - operator

volumes:
  pgdata:
  pgadmin_data:
  node_modules:
  caddy_data:
  caddy_config:
