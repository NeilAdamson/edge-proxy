services:
  caddy:
    image: caddy:2-alpine
    container_name: edge-caddy
    restart: unless-stopped
    # Use the host network namespace so Caddyfile `127.0.0.1:18080` / `:28080` refer to the
    # **host** loopback where HMS/ce-ai publish (`127.0.0.1:18080->80` etc.). In default bridge
    # mode, `127.0.0.1` inside the container is the container itself → `connection refused`
    # and HTTP 502 from edge. Host mode is the intended layout for this Linux VPS.
    # (Docker Desktop on Windows/macOS does not support host networking the same way; this
    # stack targets the production VPS.)
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
